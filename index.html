<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Malice: Multiplayer</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="lobby-layer">
            <h1>Marble Malice</h1>
            <div id="live-counter">Citizens Active: <span>0</span></div>
            <p id="status-msg">Waiting for an opponent to join the sabotage...</p>
        </div>

        <div id="game-layer" class="hidden">
            <div id="header">
                <div id="mode-label">BUILD MODE: Slow them down!</div>
                <div id="penalty-meter">Flow: <span id="flow-val">100</span>%</div>
            </div>
            
            <canvas id="gameCanvas" width="400" height="500"></canvas>

            <div id="controls">
                <button class="tool-btn active" data-type="TAR">Place Tar (Slow)</button>
                <button class="tool-btn" data-type="FAN">Place Fan (Push)</button>
                <button id="ready-btn">Lock Board & Race</button>
            </div>
        </div>

        <div id="overlay" class="hidden">
            <h2 id="overlay-msg">SWAPPING BOARDS...</h2>
        </div>
    </div>
</body>
</html>
